# Training config for the imgtrans MT core (the only trainable stage).
# Override the defaults in src/imgtrans/config.py. Paths come from env vars
# (IMGTRANS_ARTIFACTS_DIR / _MODEL_DIR / _RUN_DIR / HF_HOME) — nothing hard-coded.
project_title: Document-Image Machine Translation System
author: Le Dinh Minh Quan
student_id: "23127460"

data:
  mt_dataset: Helsinki-NLP/opus-100      # fine-tune corpus (en-fr), license unknown -> flag
  mt_config: en-fr
  ocr_text_dataset: PleIAs/Post-OCR-Correction   # optional OCR-noise text source (CC0)
  ocr_text_config: english
  src_lang: en
  tgt_lang: fr
  use_hf: true
  max_train_samples: 50000
  max_eval_samples: 2000
  synth_train_pages: 400
  synth_eval_pages: 80
  lines_per_page: 6
  image_width: 1000
  seed: 42

mt:
  base_model: facebook/m2m100_418M       # MIT; alt opus-mt-en-fr (Apache, T4) / mbart-50 (MIT, H100)
  src_lang: en
  tgt_lang: fr
  max_source_length: 200
  max_target_length: 200
  num_beams: 4
  num_train_epochs: 3
  learning_rate: 3.0e-5
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 32
  gradient_accumulation_steps: 1
  weight_decay: 0.01
  warmup_ratio: 0.05
  label_smoothing: 0.1
  early_stopping_patience: 3
  bf16: true
  fp16: false
  tf32: true
  gradient_checkpointing: false
  eval_steps: 500
  save_steps: 500
  seed: 42

ocr:
  engine: auto                           # auto -> SeedEngine on synthetic, else tesseract
  lang: eng
  dpi: 200
  psm: 3

agent:
  quality_min: 0.30
  ocr_confidence_min: 0.50
  verify_enabled: true
  verify_min_chrf: 0.30
  max_retranslate: 2
  min_fit_rate: 0.60
  llm_fallback_enabled: false
